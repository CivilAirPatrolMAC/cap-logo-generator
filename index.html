<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>Civil Air Patrol Subordinate Graphic Generator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=block" rel="stylesheet">

	<script type="text/javascript">
		let canvas;
		let ctx;
		let capFont;

		document.addEventListener('DOMContentLoaded', () => {
			canvas = document.getElementById('canvas');
			ctx = canvas.getContext('2d');

			loadFont().then(() => {
				renderGraphic();
			});

			document.getElementById('subordinateText').oninput = renderGraphic;
			document.getElementById('logoStyle').onchange = renderGraphic;
			document.getElementById('download').onclick = download;
		});

		const loadFont = async () => {
			if (capFont) return;

			const fontSource = new FontFace('Rajdhani', 'url(font.woff2)');
			capFont = await fontSource.load();
			document.fonts.add(capFont);
		};

		const drawSource = (imagePath) => {
			return new Promise((resolve) => {
				const imageSource = new Image();

				imageSource.onload = () => {
					ctx.drawImage(imageSource, 0, 0, 2000, 415, 0, 0, 2000, 415);
					resolve();
				};

				imageSource.src = imagePath;
			});
		};

		const measureTrackedText = (str, tracking) => {
			let width = 0;

			for (let i = 0; i < str.length; i++) {
				width += ctx.measureText(str[i]).width;
				if (i < str.length - 1) {
					width += tracking;
				}
			}

			return width;
		};

		const drawTrackedText = (str, startX, baselineY, tracking) => {
			let x = startX;

			for (let i = 0; i < str.length; i++) {
				const char = str[i];
				ctx.strokeText(char, x, baselineY);
				ctx.fillText(char, x, baselineY);
				x += ctx.measureText(char).width + tracking;
			}
		};

		const getResponsiveFontSize = (text, options) => {
			const {
				fontFamily,
				fontWeight,
				tracking,
				availableWidth,
				targetFillRatio,
				maxFontSize,
				minFontSize,
				maxTextHeight
			} = options;

			const referenceFontSize = 100;
			ctx.font = fontWeight + ' ' + referenceFontSize + 'px ' + fontFamily;

			const referenceWidth = measureTrackedText(text, tracking);
			if (!referenceWidth) return maxFontSize;

			const targetWidth = availableWidth * targetFillRatio;
			const widthScaledSize = Math.floor((targetWidth / referenceWidth) * referenceFontSize);

			const metrics = ctx.measureText('H');
			const referenceHeight =
				(metrics.actualBoundingBoxAscent || referenceFontSize * 0.8) +
				(metrics.actualBoundingBoxDescent || referenceFontSize * 0.2);

			const heightScale = maxTextHeight / referenceHeight;
			const heightScaledSize = Math.floor(referenceFontSize * heightScale);

			return Math.max(
				minFontSize,
				Math.min(maxFontSize, widthScaledSize, heightScaledSize)
			);
		};

		const renderGraphic = async () => {
			if (!ctx || !capFont) return;

			const rawInput = document.getElementById('subordinateText').value || 'Marketing & Communication';
			const text = rawInput.toUpperCase();
			const selectedStyle = document.getElementById('logoStyle').value;

			const isWhiteVersion = selectedStyle === 'white';
			const logoFile = isWhiteVersion ? 'WhiteLogo.png' : 'BlueLogo.png';

			const canvasWidth = 2000;
			const canvasHeight = 415;

			const startX = 600;
			const baselineY = 355;
			const safeRightPadding = 10;

			const capBlue = '#001871';
			const white = '#FFFFFF';

			const fontFamily = 'Rajdhani';
			const fontWeight = '700';

			const tracking = 3;

			const availableWidth = canvasWidth - startX - safeRightPadding;
			const targetFillRatio = 0.98;
			const maxFontSize = 130;
			const minFontSize = 50;
			const maxTextHeight = 70;

			const fontSize = getResponsiveFontSize(text, {
				fontFamily,
				fontWeight,
				tracking,
				availableWidth,
				targetFillRatio,
				maxFontSize,
				minFontSize,
				maxTextHeight
			});

			canvas.width = canvasWidth;
			canvas.height = canvasHeight;

			// ALWAYS clear canvas (no grey baked into export)
			ctx.clearRect(0, 0, canvasWidth, canvasHeight);

			// Toggle preview background (CSS only)
			if (isWhiteVersion) {
				canvas.classList.add('white-preview');
			} else {
				canvas.classList.remove('white-preview');
			}

			await drawSource(logoFile);

			const textColor = isWhiteVersion ? white : capBlue;

			ctx.fillStyle = textColor;
			ctx.strokeStyle = textColor;
			ctx.lineWidth = 1.2;
			ctx.lineJoin = 'round';
			ctx.miterLimit = 2;
			ctx.font = '700 ' + fontSize + 'px Rajdhani';

			drawTrackedText(text, startX, baselineY, tracking);
		};

		const download = () => {
			const tmpLink = document.createElement('a');
			let e;

			tmpLink.download = 'Graphic.png';
			tmpLink.href = canvas.toDataURL('image/png');

			if (document.createEvent) {
				e = document.createEvent('MouseEvents');
				e.initMouseEvent('click', true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
				tmpLink.dispatchEvent(e);
			} else if (tmpLink.fireEvent) {
				tmpLink.fireEvent('onclick');
			}
		};
	</script>

	<style type="text/css">
		body {
			padding: 50px;
			font-family: "Ubuntu", sans-serif;
		}

		label {
			display: block;
			margin-top: 20px;
		}

		input, select {
			width: 100%;
			max-width: 500px;
			padding: 10px;
			margin-bottom: 10px;
		}

		.canvas-container {
			width: 600px;
			height: 161px;
			margin: 30px 0 20px;
		}

		#canvas {
			transform-origin: 0 0;
			transform: scale(0.3);
			border: 3px solid rgb(158, 162, 162);
			padding: 60px;
			border-radius: 15px;
			background-color: #ffffff;
		}

		/* Preview-only grey background */
		#canvas.white-preview {
			background-color: #D9D9D9;
		}

		button {
			padding: 10px 20px;
			background-color: #001871;
			color: white;
			border: none;
			cursor: pointer;
		}
	</style>
</head>
<body>

	<h1>Civil Air Patrol Subordinate Graphic Generator</h1>

	<label for="subordinateText">Subordinate line</label>
	<input id="subordinateText" type="text" maxlength="30" value="Marketing & Communication">

	<label for="logoStyle">Logo version</label>
	<select id="logoStyle">
		<option value="blue">All Blue</option>
		<option value="white">All White</option>
	</select>

	<div class="canvas-container">
		<canvas id="canvas" width="2000" height="415"></canvas>
	</div>

	<button id="download">Download</button>

</body>
</html>
