<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>Civil Air Patrol Subordinate Graphic Generator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=block" rel="stylesheet">

	<script type="text/javascript">
		let canvas;
		let ctx;
		let capFont;
		let currentTextColor = '#001871';

		document.addEventListener('DOMContentLoaded', () => {
			canvas = document.getElementById('canvas');
			ctx = canvas.getContext('2d');

			loadFont().then(() => {
				renderGraphic();
			});

			document.getElementById('subordinateText').oninput = renderGraphic;
			document.getElementById('colorVariant').onchange = renderGraphic;
			document.getElementById('download').onclick = download;
		});

		const loadFont = async () => {
			if (capFont) return;

			const fontSource = new FontFace('Rajdhani', 'url(font.woff2)');
			capFont = await fontSource.load();
			document.fonts.add(capFont);
		};

		const getSelectedLogoFile = () => {
			const color = document.getElementById('colorVariant').value;
			return color === 'white' ? 'WhiteLogo.png' : 'BlueLogo.png';
		};

		const getDominantColorFromImage = (image) => {
			const sampleCanvas = document.createElement('canvas');
			const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

			const sampleWidth = 200;
			const sampleHeight = Math.max(1, Math.round((image.height / image.width) * sampleWidth));

			sampleCanvas.width = sampleWidth;
			sampleCanvas.height = sampleHeight;
			sampleCtx.drawImage(image, 0, 0, sampleWidth, sampleHeight);

			const imageData = sampleCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;

			let rTotal = 0, gTotal = 0, bTotal = 0, count = 0;

			for (let i = 0; i < imageData.length; i += 4) {
				const r = imageData[i];
				const g = imageData[i + 1];
				const b = imageData[i + 2];
				const a = imageData[i + 3];

				if (a < 50) continue;

				rTotal += r;
				gTotal += g;
				bTotal += b;
				count++;
			}

			if (count === 0) return '#001871';

			const r = Math.round(rTotal / count);
			const g = Math.round(gTotal / count);
			const b = Math.round(bTotal / count);

			return `rgb(${r}, ${g}, ${b})`;
		};

		const drawSource = () => {
			return new Promise((resolve, reject) => {
				const imageSource = new Image();

				imageSource.onload = () => {
					currentTextColor = getDominantColorFromImage(imageSource);
					ctx.drawImage(imageSource, 0, 0, 2000, 415, 0, 0, 2000, 415);
					resolve();
				};

				imageSource.onerror = () => reject('Image failed to load');

				imageSource.src = getSelectedLogoFile();
			});
		};

		const measureTrackedText = (str, tracking) => {
			let width = 0;
			for (let i = 0; i < str.length; i++) {
				width += ctx.measureText(str[i]).width;
				if (i < str.length - 1) width += tracking;
			}
			return width;
		};

		const drawTrackedText = (str, startX, baselineY, tracking) => {
			let x = startX;
			for (let i = 0; i < str.length; i++) {
				const char = str[i];
				ctx.strokeText(char, x, baselineY);
				ctx.fillText(char, x, baselineY);
				x += ctx.measureText(char).width + tracking;
			}
		};

		const getResponsiveFontSize = (text, options) => {
			const {
				fontFamily, fontWeight, tracking,
				availableWidth, targetFillRatio,
				maxFontSize, minFontSize, maxTextHeight
			} = options;

			const referenceFontSize = 100;
			ctx.font = fontWeight + ' ' + referenceFontSize + 'px ' + fontFamily;

			const referenceWidth = measureTrackedText(text, tracking);
			if (!referenceWidth) return maxFontSize;

			const targetWidth = availableWidth * targetFillRatio;
			const widthScaledSize = Math.floor((targetWidth / referenceWidth) * referenceFontSize);

			const metrics = ctx.measureText('H');
			const referenceHeight =
				(metrics.actualBoundingBoxAscent || referenceFontSize * 0.8) +
				(metrics.actualBoundingBoxDescent || referenceFontSize * 0.2);

			const heightScale = maxTextHeight / referenceHeight;
			const heightScaledSize = Math.floor(referenceFontSize * heightScale);

			return Math.max(minFontSize, Math.min(maxFontSize, widthScaledSize, heightScaledSize));
		};

		const renderGraphic = async () => {
			if (!ctx || !capFont) return;

			const rawInput = document.getElementById('subordinateText').value || 'Marketing & Communication';
			const text = rawInput.toUpperCase();

			const canvasWidth = 2000;
			const canvasHeight = 415;

			const startX = 600;
			const baselineY = 355;
			const safeRightPadding = 10;

			const fontFamily = 'Rajdhani';
			const fontWeight = '700';
			const tracking = 3;

			const availableWidth = canvasWidth - startX - safeRightPadding;

			const fontSize = getResponsiveFontSize(text, {
				fontFamily,
				fontWeight,
				tracking,
				availableWidth,
				targetFillRatio: 0.98,
				maxFontSize: 130,
				minFontSize: 50,
				maxTextHeight: 70
			});

			canvas.width = canvasWidth;
			canvas.height = canvasHeight;

			await drawSource();

			ctx.fillStyle = currentTextColor;
			ctx.strokeStyle = currentTextColor;
			ctx.lineWidth = 1.2;
			ctx.lineJoin = 'round';
			ctx.font = `700 ${fontSize}px Rajdhani`;

			drawTrackedText(text, startX, baselineY, tracking);
		};

		const download = () => {
			const tmpLink = document.createElement('a');
			tmpLink.download = 'Graphic.png';
			tmpLink.href = canvas.toDataURL('image/png');
			tmpLink.click();
		};
	</script>
</head>

<body>

	<h1>Civil Air Patrol Subordinate Graphic Generator</h1>

	<label for="subordinateText">Subordinate line</label>
	<input id="subordinateText" type="text" maxlength="30" value="Marketing & Communication">

	<label for="colorVariant">Logo Color</label>
	<select id="colorVariant">
		<option value="blue">Blue</option>
		<option value="white">White</option>
	</select>

	<div class="canvas-container">
		<canvas id="canvas" width="2000" height="415"></canvas>
	</div>

	<button id="download">Download</button>

</body>
</html>
