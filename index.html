<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>Civil Air Patrol Graphic Generator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="favicon.png">

	<script type="text/javascript">
		let canvas;
		let ctx;
		let capFont;

		document.addEventListener('DOMContentLoaded', () => {
			canvas = document.getElementById('canvas');
			ctx = canvas.getContext('2d');

			loadFont().then(() => {
				renderGraphic();
			});

			document.getElementById('text').oninput = renderGraphic;
			document.getElementById('download').onclick = download;
		});

		const loadFont = async () => {
			if (capFont) return;

			const fontSource = new FontFace('Rajdhani', 'url(font.woff2)');
			capFont = await fontSource.load();
			document.fonts.add(capFont);
		};

		const drawSource = () => {
			return new Promise((resolve) => {
				const imageSource = new Image();

				imageSource.onload = () => {
					ctx.drawImage(imageSource, 0, 0, 2000, 415, 0, 0, 2000, 415);
					resolve();
				};

				imageSource.src = 'source.svg';
			});
		};

		const measureTrackedText = (str, tracking) => {
			let width = 0;

			for (let i = 0; i < str.length; i++) {
				width += ctx.measureText(str[i]).width;
				if (i < str.length - 1) width += tracking;
			}

			return width;
		};

		const drawTrackedText = (str, startX, baselineY, tracking) => {
			let x = startX;

			for (let i = 0; i < str.length; i++) {
				const char = str[i];
				ctx.fillText(char, x, baselineY);
				x += ctx.measureText(char).width + tracking;
			}
		};

		const renderGraphic = async () => {
			if (!ctx || !capFont) return;

			const input = document.getElementById('text').value || 'Insert Text Here';
			const text = input.toUpperCase();

			const startX = 591;
			const baselineY = 360; // safely below emblem
			const tracking = 25;
			const fontSize = 120; // scaled to fit cleanly
			const capBlue = '#001871';

			ctx.font = 'bold ' + fontSize + 'px Rajdhani';
			const textWidth = measureTrackedText(text, tracking);

			const neededWidth = startX + textWidth + 50;

			canvas.width = Math.max(2000, neededWidth);
			canvas.height = 415;

			await drawSource();

			ctx.fillStyle = capBlue;
			ctx.font = 'bold ' + fontSize + 'px Rajdhani';

			drawTrackedText(text, startX, baselineY, tracking);
		};

		const download = () => {
			const tmpLink = document.createElement('a');
			tmpLink.download = 'Graphic.png';
			tmpLink.href = canvas.toDataURL('image/png');

			const e = document.createEvent('MouseEvents');
			e.initMouseEvent('click', true, true, window);
			tmpLink.dispatchEvent(e);
		};
	</script>

	<style>
		body {
			padding: 50px;
			font-family: Arial, sans-serif;
		}

		h1 {
			color: #001871;
			margin-bottom: 10px;
		}

		input {
			margin-top: 20px;
			padding: 10px 20px;
			font-size: 16px;
			border-radius: 5px;
			border: 1px solid #ccc;
			width: 400px;
		}

		.canvas-container {
			margin: 30px 0;
		}

		#canvas {
			transform: scale(0.3);
			transform-origin: 0 0;
			border: 2px solid #ccc;
			padding: 40px;
			border-radius: 10px;
		}

		button {
			padding: 10px 20px;
			background-color: #001871;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
	</style>
</head>
<body>

	<h1>CAP Graphic Generator</h1>

	<p>Generate a single-line Civil Air Patrol graphic.</p>

	<input id="text" type="text" placeholder="Insert Text Here" maxlength="26" />

	<div class="canvas-container">
		<canvas id="canvas" width="2000" height="415"></canvas>
	</div>

	<button id="download">Download</button>

</body>
</html>
